<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Humaniza OS Login</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial,Helvetica,sans-serif;background:#0b0b0f;color:#fff}
.hidden{display:none!important}
.login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:radial-gradient(circle at top,#231719,#0b0b0f 55%)}
.login-card{width:min(430px,94vw);background:#15151b;border:1px solid #2b2b36;border-radius:20px;padding:28px}
.logo{font-size:30px;font-weight:900}.logo span{color:#ff5b3e}
p{color:#969ab7;line-height:1.4}
input,select,textarea{width:100%;background:#111117;border:1px solid #2b2b36;color:#fff;border-radius:10px;padding:13px 15px;font-size:14px;outline:none;margin-bottom:12px}
button{border:0;cursor:pointer;color:#fff;font-weight:800;border-radius:10px;background:#ff5b3e;padding:12px 16px;font-size:14px}
.btn-dark{background:#252532}.btn-green{background:#1f9d55}.btn-blue{background:#3877ff}.btn-danger{background:#8e2a2a}.btn-gold{background:#b9852b}
header{height:74px;border-bottom:1px solid #25252d;display:flex;align-items:center;justify-content:space-between;padding:0 28px;background:#0b0b0f;position:sticky;top:0;z-index:5}
.container{width:min(1680px,94vw);margin:30px auto}
.tabs{display:flex;gap:20px;border-bottom:1px solid #2b2b36;margin-bottom:24px;flex-wrap:wrap}
.tab{padding:0 0 14px;color:#8d91ad;font-weight:900;cursor:pointer}.tab.active{color:#fff;border-bottom:2px solid #ff5b3e}
.top{display:flex;gap:12px;align-items:center;justify-content:space-between;flex-wrap:wrap;margin-bottom:24px}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:18px}
.card,.panel,.stat{background:#15151b;border:1px solid #2b2b36;border-radius:16px;padding:20px}
.card h3,.panel h3{margin:0 0 10px;font-size:18px}
.meta{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.pill{background:#1d1d27;color:#b7bad0;border:1px solid #30303b;border-radius:999px;padding:6px 10px;font-size:12px;font-weight:800}
.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:16px}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;margin-bottom:22px}
.stat p{margin:0 0 10px;color:#8d91ad;text-transform:uppercase;font-size:12px;letter-spacing:1px}.stat strong{font-size:36px}
.progress{height:7px;border-radius:999px;background:#2b2b36;overflow:hidden;margin-top:12px}.progress span{display:block;height:100%;background:#42b883;width:0%}
.board-wrap{overflow-x:auto;padding-bottom:12px}
.board{display:grid;grid-template-columns:repeat(7,minmax(245px,1fr));gap:18px;min-width:1720px}
.column{background:#15151b;border:1px solid #2b2b36;border-radius:14px;padding:18px;min-height:390px}
.column-title{font-weight:900;text-transform:uppercase;font-size:14px;display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.count{background:#1d1d27;color:#8d91ad;padding:3px 11px;border-radius:999px;font-size:12px}
.task{background:#1d1d25;border:1px solid #2b2b36;border-radius:12px;padding:15px;margin-bottom:12px;position:relative}
.task h4{margin:0 0 10px;padding-right:60px}.task p{font-size:13px;color:#969ab7}
.task.approved{border-color:#42b883}.task.adjust{border-color:#ffbd4a}.task.late{border-color:#ff4d4d;background:#241719}
.badge{display:inline-block;border-radius:999px;padding:5px 9px;font-size:11px;font-weight:900;text-transform:uppercase;margin:4px 4px 0 0}
.b-green{background:rgba(66,184,131,.18);color:#42b883;border:1px solid rgba(66,184,131,.35)}
.b-yellow{background:rgba(255,189,74,.18);color:#ffbd4a;border:1px solid rgba(255,189,74,.35)}
.b-red{background:rgba(255,77,77,.18);color:#ff5b5b;border:1px solid rgba(255,77,77,.35)}
.b-blue{background:rgba(77,163,255,.18);color:#4da3ff;border:1px solid rgba(77,163,255,.35)}
.icon-actions{position:absolute;right:10px;top:10px}
.icon{width:28px;height:28px;border-radius:8px;background:#15151b;border:1px solid #30303b;display:grid;place-items:center;padding:0}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:20;align-items:center;justify-content:center;padding:20px}
.modal.active{display:flex}
.modal-card{width:min(780px,96vw);background:#15151b;border:1px solid #2b2b36;border-radius:16px;padding:24px;max-height:92vh;overflow:auto}
.form{display:grid;grid-template-columns:1fr 1fr;gap:12px}.full{grid-column:1/-1}
.empty{text-align:center;color:#8d91ad;padding:48px 0}
.client-header{background:linear-gradient(135deg,#15151b,#1d1517);border:1px solid #2b2b36;border-radius:18px;padding:24px;margin-bottom:22px}
.client-header h2{margin:0 0 8px;font-size:30px}
.todo-list{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:22px}
.todo{background:#191920;border:1px solid #2b2b36;border-radius:14px;padding:16px}
.todo h4{margin:0 0 8px}.todo p{color:#969ab7;font-size:13px}
.notice{background:#241719;border:1px solid #633;padding:12px;border-radius:12px;color:#ffb3b3;margin-top:12px;font-size:14px}
@media(max-width:1100px){.grid,.stats,.todo-list{grid-template-columns:1fr 1fr}.form{grid-template-columns:1fr}.full{grid-column:auto}}
@media(max-width:720px){header{padding:0 16px}.grid,.stats,.todo-list{grid-template-columns:1fr}.logo{font-size:21px}.client-header h2{font-size:24px}}
</style>
</head>
<body>

<section id="loginPage" class="login">
  <div class="login-card">
    <div class="logo">Humaniza<span>.</span>OS</div>
    <p>Entre para acessar o painel da agência ou a área do cliente.</p>
    <input id="loginEmail" type="email" placeholder="E-mail">
    <input id="loginPassword" type="password" placeholder="Senha">
    <button style="width:100%" onclick="login()">Entrar</button>
    <div class="notice" id="loginError" style="display:none"></div>
    <p style="font-size:12px;margin-top:18px">Admin: humanizamedia@gmail.com</p>
  </div>
</section>

<section id="appPage" class="hidden">
<header>
  <div class="logo">Humaniza<span>.</span>OS</div>
  <div class="actions">
    <span id="userInfo" class="pill"></span>
    <button id="btnClient" onclick="openClientModal()">+ Cliente</button>
    <button id="btnDemand" onclick="openDemandModal()" class="btn-blue">+ Demanda</button>
    <button onclick="logout()" class="btn-dark">Sair</button>
  </div>
</header>

<main class="container">
  <div class="tabs" id="tabs"></div>
  <section id="dashboardView"></section>
  <section id="clientsView" class="hidden">
    <div class="top"><h2>Clientes cadastrados</h2><input class="search" id="clientSearch" placeholder="Buscar cliente..." oninput="renderClients()"></div>
    <div class="grid" id="clientsGrid"></div>
  </section>
  <section id="demandsView" class="hidden">
    <div class="top"><h2>Demandas dos clientes</h2><select style="max-width:320px" id="agencyClientFilter" onchange="renderDemands()"></select></div>
    <div class="board-wrap"><div class="board" id="demandsBoard"></div></div>
  </section>
  <section id="clientPanelView" class="hidden"><div id="clientPanelContent"></div></section>
</main>
</section>

<div class="modal" id="clientModal">
  <div class="modal-card">
    <h2 id="clientModalTitle">Novo cliente</h2>
    <div class="form">
      <input id="clientName" placeholder="Nome do cliente" class="full">
      <input id="clientEmail" placeholder="E-mail de login do cliente">
      <input id="clientWhatsapp" placeholder="WhatsApp">
      <input id="clientDrive" placeholder="Link da pasta do Drive">
      <input id="clientInstagram" placeholder="Instagram do cliente">
      <select id="clientStatus"><option>Ativo</option><option>Pausado</option><option>Finalizado</option></select>
      <textarea id="clientObs" class="full" rows="4" placeholder="Observações"></textarea>
    </div>
    <div class="actions">
      <button class="btn-danger" id="deleteClientBtn" onclick="deleteClient()" style="display:none">Excluir</button>
      <button class="btn-dark" onclick="closeModals()">Cancelar</button>
      <button onclick="saveClient()">Salvar cliente</button>
    </div>
  </div>
</div>

<div class="modal" id="demandModal">
  <div class="modal-card">
    <h2 id="demandModalTitle">Nova demanda</h2>
    <div class="form">
      <select id="demandClient" class="full"></select>
      <input id="demandTitle" placeholder="Nome da demanda" class="full">
      <select id="demandType"><option>Estratégia</option><option>Aprovação de post</option><option>Aprovação de vídeo</option><option>Roteiro</option><option>Calendário</option><option>Aguardando cliente</option><option>Material pendente</option><option>Financeiro</option></select>
      <select id="demandStatus"><option>Estratégia</option><option>Em produção</option><option>Aguardando aprovação</option><option>Aguardando você</option><option>Ajustes solicitados</option><option>Aprovado</option><option>Publicado</option></select>
      <input id="demandDate" type="date">
      <select id="demandPriority"><option>Normal</option><option>Alta</option><option>Urgente</option></select>
      <input id="demandLink" class="full" placeholder="Link do post, vídeo, arte ou pasta">
      <textarea id="demandDesc" class="full" rows="4" placeholder="Descrição da demanda"></textarea>
      <textarea id="demandComment" class="full" rows="3" placeholder="Comentário do cliente ou ajuste solicitado"></textarea>
    </div>
    <div class="actions">
      <button class="btn-danger" id="deleteDemandBtn" onclick="deleteDemand()" style="display:none">Excluir</button>
      <button class="btn-dark" onclick="closeModals()">Cancelar</button>
      <button onclick="saveDemand()">Salvar demanda</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";
import { getFirestore, collection, doc, addDoc, setDoc, deleteDoc, onSnapshot, query, where, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB2xU6wgDjswece50JVE-thiCb40wP-58M",
  authDomain: "humaniza-os.firebaseapp.com",
  projectId: "humaniza-os",
  storageBucket: "humaniza-os.firebasestorage.app",
  messagingSenderId: "416592042651",
  appId: "1:416592042651:web:66dd16c8e823e57d5b443e",
  measurementId: "G-YQMK274JER"
};

const ADMIN_EMAIL = "humanizamedia@gmail.com";
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;
let isAdmin = false;
let clients = [];
let demands = [];
let selectedClientId = null;
let editingClient = null;
let editingDemand = null;
let unsubClients = null;
let unsubDemands = null;
const demandStatuses = ['Estratégia','Em produção','Aguardando aprovação','Aguardando você','Ajustes solicitados','Aprovado','Publicado'];

window.login = async function(){
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  const error = document.getElementById('loginError');
  error.style.display = 'none';
  try { await signInWithEmailAndPassword(auth, email, password); }
  catch(e) { error.textContent = "Erro no login. Confira e-mail e senha."; error.style.display = 'block'; }
}
window.logout = function(){ signOut(auth); }

onAuthStateChanged(auth, async (user) => {
  if(user){
    currentUser = user;
    isAdmin = user.email.toLowerCase() === ADMIN_EMAIL.toLowerCase();
    document.getElementById('loginPage').classList.add('hidden');
    document.getElementById('appPage').classList.remove('hidden');
    document.getElementById('userInfo').textContent = isAdmin ? 'Agência' : 'Cliente';
    setupTabs();
    startListeners();
  } else {
    currentUser = null;
    document.getElementById('loginPage').classList.remove('hidden');
    document.getElementById('appPage').classList.add('hidden');
    if(unsubClients) unsubClients();
    if(unsubDemands) unsubDemands();
  }
});

function setupTabs(){
  const tabs = document.getElementById('tabs');
  if(isAdmin){
    tabs.innerHTML = `
      <div class="tab active" onclick="showView('dashboard', this)">📊 Visão geral</div>
      <div class="tab" onclick="showView('clients', this)">👥 Clientes</div>
      <div class="tab" onclick="showView('demands', this)">🗂️ Demandas</div>
      <div class="tab" onclick="showView('clientPanel', this)">🖥️ Tela do cliente</div>
    `;
    document.getElementById('btnClient').style.display = 'inline-block';
    document.getElementById('btnDemand').style.display = 'inline-block';
    showView('dashboard', document.querySelector('.tab'));
  } else {
    tabs.innerHTML = `<div class="tab active" onclick="showView('clientPanel', this)">🖥️ Minha área</div>`;
    document.getElementById('btnClient').style.display = 'none';
    document.getElementById('btnDemand').style.display = 'none';
    showView('clientPanel', document.querySelector('.tab'));
  }
}

function startListeners(){
  if(unsubClients) unsubClients();
  if(unsubDemands) unsubDemands();

  if(isAdmin){
    unsubClients = onSnapshot(collection(db, 'clients'), snap => {
      clients = snap.docs.map(d => ({id:d.id, ...d.data()}));
      selectedClientId = selectedClientId || clients[0]?.id || null;
      refreshAll();
    });
    unsubDemands = onSnapshot(collection(db, 'demands'), snap => {
      demands = snap.docs.map(d => ({id:d.id, ...d.data()}));
      refreshAll();
    });
  } else {
    unsubClients = onSnapshot(query(collection(db, 'clients'), where('email','==', currentUser.email)), snap => {
      clients = snap.docs.map(d => ({id:d.id, ...d.data()}));
      selectedClientId = clients[0]?.id || null;
      refreshAll();
    });
    unsubDemands = onSnapshot(query(collection(db, 'demands'), where('clientEmail','==', currentUser.email)), snap => {
      demands = snap.docs.map(d => ({id:d.id, ...d.data()}));
      refreshAll();
    });
  }
}

window.showView = function(view, el){
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  if(el) el.classList.add('active');
  ['dashboard','clients','demands','clientPanel'].forEach(v => document.getElementById(v+'View').classList.add('hidden'));
  document.getElementById(view+'View').classList.remove('hidden');
  if(view==='dashboard') renderDashboard();
  if(view==='clients') renderClients();
  if(view==='demands') renderDemands();
  if(view==='clientPanel') renderClientPanel(selectedClientId);
}

function refreshAll(){
  if(isAdmin) { renderDashboard(); renderClients(); renderDemands(); }
  renderClientPanel(selectedClientId);
}
function formatDate(date){ if(!date) return ''; const d = new Date(date + 'T00:00:00'); return d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'}); }
function todayOnly(){ const n=new Date(); return new Date(n.getFullYear(),n.getMonth(),n.getDate()); }
function isLate(x){ if(!x.date || ['Publicado','Aprovado'].includes(x.status)) return false; return new Date(x.date+'T00:00:00') < todayOnly(); }
function clientById(id){ return clients.find(c => c.id === id); }
function calcProgress(list){ if(!list.length) return 0; const done=list.filter(x => ['Aprovado','Publicado'].includes(x.status)).length; return Math.round((done/list.length)*100); }

function renderDashboard(){
  if(!isAdmin) return;
  const total = demands.length;
  const late = demands.filter(isLate).length;
  const urgent = demands.filter(x => x.priority === 'Urgente').length;
  const waiting = demands.filter(d => d.status === 'Aguardando aprovação' || d.status === 'Aguardando você').length;
  const progress = calcProgress(demands);
  document.getElementById('dashboardView').innerHTML = `
    <div class="stats">
      <div class="stat"><p>Total demandas</p><strong>${total}</strong></div>
      <div class="stat"><p>Atrasadas</p><strong>${late}</strong></div>
      <div class="stat"><p>Urgentes</p><strong>${urgent}</strong></div>
      <div class="stat"><p>Progresso geral</p><strong>${progress}%</strong><div class="progress"><span style="width:${progress}%"></span></div></div>
    </div>
    <div class="grid">
      <div class="panel"><h3>👥 Clientes</h3><p>${clients.length} cliente(s) cadastrado(s).</p></div>
      <div class="panel"><h3>🗂️ Demandas</h3><p>${demands.length} demanda(s) no sistema.</p></div>
      <div class="panel"><h3>⚠️ Aguardando ação</h3><p>${waiting} demanda(s) aguardando aprovação ou retorno.</p></div>
      <div class="panel"><h3>🔐 Login ativo</h3><p>Agência e clientes com acesso separado pelo Firebase.</p></div>
    </div>`;
}

window.renderClients = function(){
  if(!isAdmin) return;
  const grid=document.getElementById('clientsGrid');
  const q=(document.getElementById('clientSearch')?.value||'').toLowerCase();
  const list=clients.filter(c => (c.name||'').toLowerCase().includes(q) || (c.instagram||'').toLowerCase().includes(q));
  grid.innerHTML = list.length ? list.map(c => {
    const ds=demands.filter(d => d.clientId===c.id);
    const approval=ds.filter(d => d.status==='Aguardando aprovação').length;
    const waiting=ds.filter(d => d.status==='Aguardando você').length;
    const progress=calcProgress(ds);
    return `<div class="card"><h3>${c.name}</h3><p>${c.obs||'Sem observações.'}</p><div class="meta"><span class="pill">${c.status||'Ativo'}</span>${c.email?`<span class="pill">${c.email}</span>`:''}${c.instagram?`<span class="pill">${c.instagram}</span>`:''}<span class="pill">${approval} aprovação</span><span class="pill">${waiting} aguardando cliente</span></div><div class="progress"><span style="width:${progress}%"></span></div><div class="actions"><button onclick="renderClientPanel('${c.id}'); showClientPanelTab()">Abrir tela</button><button class="btn-blue" onclick="openDemandModal('${c.id}')">+ Demanda</button><button class="btn-dark" onclick="editClient('${c.id}')">Editar</button>${c.whatsapp?`<button class="btn-green" onclick="openWhats('${c.whatsapp}','Oi! Tudo bem? Passando para atualizar as demandas da ${c.name}.')">WhatsApp</button>`:''}</div></div>`;
  }).join('') : '<div class="empty">Nenhum cliente cadastrado.</div>';
  fillSelects();
}

function showClientPanelTab(){
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  if(isAdmin) document.querySelectorAll('.tab')[3].classList.add('active');
  ['dashboard','clients','demands'].forEach(v => document.getElementById(v+'View').classList.add('hidden'));
  document.getElementById('clientPanelView').classList.remove('hidden');
}
window.showClientPanelTab = showClientPanelTab;

window.renderDemands = function(){
  if(!isAdmin) return;
  fillSelects();
  const filter=document.getElementById('agencyClientFilter').value;
  const data=filter==='Todos'?demands:demands.filter(d => d.clientId===filter);
  document.getElementById('demandsBoard').innerHTML = demandStatuses.map(st => {
    const items=data.filter(d => d.status===st);
    return `<div class="column"><div class="column-title">${st}<span class="count">${items.length}</span></div>${items.length ? items.map(demandCard).join('') : '<div class="empty">Nada aqui</div>'}</div>`;
  }).join('');
}

window.renderClientPanel = function(clientId){
  selectedClientId = clientId || selectedClientId || clients[0]?.id;
  const c=clientById(selectedClientId);
  const content=document.getElementById('clientPanelContent');
  if(!c){ content.innerHTML='<div class="empty">Nenhum cliente vinculado a este login ainda.</div>'; return; }
  const data=demands.filter(d => d.clientId===c.id || d.clientEmail === c.email);
  const approval=data.filter(d => d.status==='Aguardando aprovação');
  const waiting=data.filter(d => d.status==='Aguardando você');
  const late=data.filter(isLate);
  const progress=calcProgress(data);
  content.innerHTML = `<div class="client-header"><h2>${c.name}</h2><p style="color:#969ab7;margin:0">${c.obs||''}</p><div class="meta"><span class="pill">${c.status||'Ativo'}</span>${c.instagram?`<span class="pill">${c.instagram}</span>`:''}${c.drive?'<span class="pill">Drive cadastrado</span>':''}</div><div class="actions">${isAdmin?`<button class="btn-blue" onclick="openDemandModal('${c.id}')">+ Nova demanda</button>`:''}${c.drive?`<button class="btn-dark" onclick="window.open('${c.drive}','_blank')">Abrir Drive</button>`:''}${c.whatsapp?`<button class="btn-green" onclick="openWhats('${c.whatsapp}','Oi! Tudo bem? Passando para atualizar as demandas da ${c.name}.')">WhatsApp</button>`:''}</div></div>
  <div class="stats"><div class="stat"><p>Total</p><strong>${data.length}</strong></div><div class="stat"><p>Aguardando aprovação</p><strong>${approval.length}</strong></div><div class="stat"><p>Aguardando você</p><strong>${waiting.length}</strong></div><div class="stat"><p>Progresso do mês</p><strong>${progress}%</strong><div class="progress"><span style="width:${progress}%"></span></div></div></div>
  <div class="todo-list"><div class="todo"><h4>✅ Aprovar conteúdo</h4><p>${approval.length?`${approval.length} demanda(s) aguardando aprovação.`:'Nenhuma aprovação pendente.'}</p></div><div class="todo"><h4>📩 Aguardando você</h4><p>${waiting.length?`${waiting.length} item(ns) precisam de retorno ou material.`:'Nada pendente com o cliente.'}</p></div><div class="todo"><h4>⚠️ Atenção</h4><p>${late.length?`${late.length} demanda(s) atrasada(s).`:'Tudo dentro do prazo.'}</p></div></div>
  <div class="board-wrap"><div class="board">${demandStatuses.map(st => {const items=data.filter(d => d.status===st); return `<div class="column"><div class="column-title">${st}<span class="count">${items.length}</span></div>${items.length?items.map(demandCard).join(''):'<div class="empty">Nada aqui</div>'}</div>`}).join('')}</div></div>`;
}

function demandCard(d){
  const c=clientById(d.clientId);
  const late=isLate(d), approved=['Aprovado','Publicado'].includes(d.status), adjust=d.status==='Ajustes solicitados', waiting=d.status==='Aguardando você';
  return `<div class="task ${late?'late':''} ${approved?'approved':''} ${adjust?'adjust':''}"><div class="icon-actions">${isAdmin?`<button class="icon" onclick="editDemand('${d.id}')">✏️</button>`:''}</div><h4>${d.title}</h4><span class="badge b-blue">${d.type}</span>${late?'<span class="badge b-red">Atrasada</span>':''}${d.priority==='Urgente'?'<span class="badge b-yellow">Urgente</span>':''}${waiting?'<span class="badge b-yellow">Aguardando você</span>':''}${approved?'<span class="badge b-green">Aprovado</span>':''}${adjust?'<span class="badge b-yellow">Ajuste</span>':''}<p>${d.desc||''}</p><div class="meta"><span class="pill">${c?c.name:'Cliente'}</span>${d.date?`<span class="pill">Prazo: ${formatDate(d.date)}</span>`:''}</div>${d.comment?`<p><b>Comentário:</b> ${d.comment}</p>`:''}<div class="actions"><button class="btn-green" onclick="approveDemand('${d.id}')">Aprovar</button><button class="btn-dark" onclick="requestAdjust('${d.id}')">Pedir ajuste</button>${isAdmin?`<button class="btn-gold" onclick="waitingClient('${d.id}')">Aguardando você</button>`:''}${d.link?`<button class="btn-blue" onclick="window.open('${d.link}','_blank')">Abrir link</button>`:''}</div></div>`;
}

function fillSelects(){
  if(!isAdmin) return;
  document.getElementById('demandClient').innerHTML = clients.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
  document.getElementById('agencyClientFilter').innerHTML = '<option>Todos</option>' + clients.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
}

window.openClientModal = function(){
  editingClient=null; 
  document.getElementById('clientModalTitle').textContent='Novo cliente';
  document.getElementById('deleteClientBtn').style.display='none';
  ['clientName','clientEmail','clientWhatsapp','clientDrive','clientInstagram','clientObs'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('clientStatus').value='Ativo';
  document.getElementById('clientModal').classList.add('active');
}
window.editClient = function(id){
  const c=clientById(id); if(!c)return;
  editingClient=id;
  document.getElementById('clientModalTitle').textContent='Editar cliente';
  document.getElementById('deleteClientBtn').style.display='inline-block';
  document.getElementById('clientName').value=c.name||'';
  document.getElementById('clientEmail').value=c.email||'';
  document.getElementById('clientWhatsapp').value=c.whatsapp||'';
  document.getElementById('clientDrive').value=c.drive||'';
  document.getElementById('clientInstagram').value=c.instagram||'';
  document.getElementById('clientStatus').value=c.status||'Ativo';
  document.getElementById('clientObs').value=c.obs||'';
  document.getElementById('clientModal').classList.add('active');
}
window.saveClient = async function(){
  const data={name:clientName.value.trim(),email:clientEmail.value.trim(),whatsapp:clientWhatsapp.value.trim(),drive:clientDrive.value.trim(),instagram:clientInstagram.value.trim(),status:clientStatus.value,obs:clientObs.value.trim(),updatedAt:serverTimestamp()};
  if(!data.name){alert('Coloque o nome do cliente.');return;}
  if(!data.email){alert('Coloque o e-mail de login do cliente.');return;}
  if(editingClient) await setDoc(doc(db,'clients',editingClient), data, {merge:true});
  else await addDoc(collection(db,'clients'), {...data, createdAt:serverTimestamp()});
  closeModals();
}
window.deleteClient = async function(){
  if(!editingClient)return;
  if(confirm('Excluir cliente? As demandas dele não serão excluídas automaticamente.')){
    await deleteDoc(doc(db,'clients',editingClient));
    closeModals();
  }
}

window.openDemandModal = function(clientId){
  editingDemand=null; 
  document.getElementById('demandModalTitle').textContent='Nova demanda';
  document.getElementById('deleteDemandBtn').style.display='none';
  fillSelects();
  document.getElementById('demandClient').value=clientId||selectedClientId||clients[0]?.id||'';
  ['demandTitle','demandDate','demandLink','demandDesc','demandComment'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('demandType').value='Estratégia';
  document.getElementById('demandStatus').value='Estratégia';
  document.getElementById('demandPriority').value='Normal';
  document.getElementById('demandModal').classList.add('active');
}
window.editDemand = function(id){
  const d=demands.find(x=>x.id===id); if(!d)return;
  editingDemand=id; fillSelects();
  document.getElementById('demandModalTitle').textContent='Editar demanda';
  document.getElementById('deleteDemandBtn').style.display='inline-block';
  document.getElementById('demandClient').value=d.clientId;
  document.getElementById('demandTitle').value=d.title||'';
  document.getElementById('demandType').value=d.type||'Estratégia';
  document.getElementById('demandStatus').value=d.status||'Estratégia';
  document.getElementById('demandDate').value=d.date||'';
  document.getElementById('demandPriority').value=d.priority||'Normal';
  document.getElementById('demandLink').value=d.link||'';
  document.getElementById('demandDesc').value=d.desc||'';
  document.getElementById('demandComment').value=d.comment||'';
  document.getElementById('demandModal').classList.add('active');
}
window.saveDemand = async function(){
  const c = clientById(demandClient.value);
  const data={clientId:demandClient.value,clientEmail:c?.email||'',title:demandTitle.value.trim(),type:demandType.value,status:demandStatus.value,date:demandDate.value,priority:demandPriority.value,link:demandLink.value.trim(),desc:demandDesc.value.trim(),comment:demandComment.value.trim(),updatedAt:serverTimestamp()};
  if(!data.clientId){alert('Cadastre um cliente primeiro.');return;}
  if(!data.title){alert('Coloque o nome da demanda.');return;}
  if(editingDemand) await setDoc(doc(db,'demands',editingDemand), data, {merge:true});
  else await addDoc(collection(db,'demands'), {...data, createdAt:serverTimestamp()});
  selectedClientId=data.clientId;
  closeModals();
}
window.deleteDemand = async function(){
  if(!editingDemand)return;
  if(confirm('Excluir essa demanda?')){
    await deleteDoc(doc(db,'demands',editingDemand));
    closeModals();
  }
}
window.approveDemand = async function(id){
  await setDoc(doc(db,'demands',id), {status:'Aprovado', updatedAt:serverTimestamp()}, {merge:true});
}
window.waitingClient = async function(id){
  await setDoc(doc(db,'demands',id), {status:'Aguardando você', updatedAt:serverTimestamp()}, {merge:true});
}
window.requestAdjust = async function(id){
  const text=prompt('Qual ajuste deseja solicitar?');
  await setDoc(doc(db,'demands',id), {status:'Ajustes solicitados', comment:text||'', updatedAt:serverTimestamp()}, {merge:true});
}
window.openWhats = function(phone,text){
  const clean=String(phone||'').replace(/\D/g,'');
  const msg=encodeURIComponent(text||'Oi! Tudo bem?');
  if(clean) window.open(`https://wa.me/55${clean}?text=${msg}`,'_blank');
  else window.open(`https://wa.me/?text=${msg}`,'_blank');
}
window.closeModals = function(){ document.querySelectorAll('.modal').forEach(m=>m.classList.remove('active')); }
document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeModals(); });
</script>
</body>
</html>
